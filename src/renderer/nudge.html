<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
  <title>Ghostwork</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #242424;
      --border-light: #2e2e2e;
      --text: #e0e0e0;
      --text-muted: #888;
      --amber: #f59e0b;
      --green: #22c55e;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    html, body {
      width: 340px;
      min-height: 100px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border-light);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .container {
      display: flex;
      flex-direction: column;
      padding: 14px 16px;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
    }

    .label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .body {
      font-size: 13px;
      line-height: 1.45;
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .btn-dismiss {
      background: transparent;
      color: var(--text-muted);
    }
    .btn-dismiss:hover { border-color: var(--border-light); color: var(--text); }

    .btn-do {
      background: var(--amber);
      color: #000;
      border-color: var(--amber);
      font-weight: 600;
    }
    .btn-do:hover { filter: brightness(1.08); }
    .btn-do:disabled { opacity: 0.5; cursor: default; }

    .evidence {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .evidence .count {
      color: var(--amber);
      font-weight: 600;
    }

    .steps-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .steps-preview .step {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: baseline;
      gap: 5px;
    }
    .steps-preview .step::before {
      content: '→';
      color: var(--amber);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="dot"></div>
      <span class="label">Ghostwork suggestion</span>
    </div>
    <div class="body" id="body"></div>
    <div class="evidence" id="evidence" style="display:none">
      <span>Seen <span class="count" id="count"></span>x</span>
    </div>
    <div class="steps-preview" id="steps-preview" style="display:none"></div>
    <div class="actions">
      <button class="btn-dismiss" id="dismiss">Dismiss</button>
      <button class="btn-do" id="do-it">Do it</button>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('body').textContent = params.get('action') || 'Suggested action';

    const evidenceCount = params.get('evidenceCount');
    if (evidenceCount && parseInt(evidenceCount) > 0) {
      document.getElementById('evidence').style.display = 'flex';
      document.getElementById('count').textContent = evidenceCount;
    }

    const stepsRaw = params.get('steps');
    if (stepsRaw) {
      const steps = stepsRaw.split('|||').filter(Boolean);
      if (steps.length > 0) {
        const preview = document.getElementById('steps-preview');
        preview.style.display = 'flex';
        steps.forEach(s => {
          const el = document.createElement('div');
          el.className = 'step';
          el.textContent = s;
          preview.appendChild(el);
        });
      }
    }

    document.getElementById('do-it').addEventListener('click', async () => {
      const btn = document.getElementById('do-it');
      btn.disabled = true;
      btn.textContent = 'Running…';
      await window.nudgeApi.doIt();
    });

    document.getElementById('dismiss').addEventListener('click', () => {
      window.nudgeApi.dismiss();
    });
  </script>
</body>
</html>
